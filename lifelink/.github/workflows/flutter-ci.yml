name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
    paths: ['mobile/**', '.github/workflows/flutter-ci.yml']
  pull_request:
    branches: [main]
    paths: ['mobile/**']

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Verify formatting
        working-directory: mobile
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        working-directory: mobile
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        working-directory: mobile
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: mobile/coverage
          flags: flutter

  build-android:
    name: Build Android
    needs: analyze
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: stable
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > mobile/android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > mobile/android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build App Bundle
        working-directory: mobile
        run: flutter build appbundle --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.sha }}
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-ios:
    name: Build iOS
    needs: analyze
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: stable

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS (no code signing for CI)
        working-directory: mobile
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ github.sha }}
          path: mobile/build/ios/iphoneos/Runner.app
          retention-days: 30
