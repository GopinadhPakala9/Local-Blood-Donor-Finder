version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lifelink-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lifelink
      POSTGRES_USER: lifelink_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lifelink_secure_password}
      POSTGRES_INITDB_ARGS: '--auth-host=scram-sha-256'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lifelink_user -d lifelink']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - lifelink-network

  redis:
    image: redis:7-alpine
    container_name: lifelink-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lifelink-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: runner
    container_name: lifelink-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: lifelink
      DATABASE_USER: lifelink_user
      DATABASE_PASSWORD: ${DB_PASSWORD:-lifelink_secure_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lifelink-network

  nginx:
    image: nginx:1.25-alpine
    container_name: lifelink-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - lifelink-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  lifelink-network:
    driver: bridge
